[versions]
android-gradle-plugin = "8.0.0"
androidx-compose-material3 = "1.1.0-beta02"
androidx-compose-ui = "1.3.3"
androidx-lifecycle = "2.6.1"
com-google-accompanist = "0.30.1"
com-google-dagger = "2.45"
io-coil-kt = "2.3.0"
kotlin = "1.8.20"
kotlinCompilerExtensionVersion = "1.4.5"
minSdk = "24"
sdkVersion = "33"

[libraries]
accompanist-pager = { module = "com.google.accompanist:accompanist-pager", version.ref = "com-google-accompanist" }
accompanist-pager-indicators = { module = "com.google.accompanist:accompanist-pager-indicators", version.ref = "com-google-accompanist" }
accompanist-systemuicontroller = { module = "com.google.accompanist:accompanist-systemuicontroller", version.ref = "com-google-accompanist" }
androidx-activity-compose = "androidx.activity:activity-compose:1.7.0"
androidx-compose-bom = "androidx.compose:compose-bom:2023.04.00"
androidx-compose-material-icons-core = { module = "androidx.compose.material:material-icons-core" }
androidx-compose-material-icons-extended = { module = "androidx.compose.material:material-icons-extended" }
androidx-compose-material3 = { module = "androidx.compose.material3:material3", version.ref = "androidx-compose-material3" }
androidx-compose-material3-window = { module = "androidx.compose.material3:material3-window-size-class" }
androidx-compose-ui = { module = "androidx.compose.ui:ui" }
androidx-compose-ui-test-junit4 = { module = "androidx.compose.ui:ui-test-junit4" }
androidx-compose-ui-test-manifest = { module = "androidx.compose.ui:ui-test-manifest" }
androidx-compose-ui-tooling = { module = "androidx.compose.ui:ui-tooling" }
androidx-compose-ui-tooling-preview = { module = "androidx.compose.ui:ui-tooling-preview" }
androidx-core-ktx = "androidx.core:core-ktx:1.9.0"
androidx-core-splashscreen = "androidx.core:core-splashscreen:1.0.0"
androidx-espresso-core = "androidx.test.espresso:espresso-core:3.5.1"
androidx-junit = "androidx.test.ext:junit:1.1.5"
androidx-lifecycle-runtime-ktx = { module = "androidx.lifecycle:lifecycle-runtime-ktx", version.ref = "androidx-lifecycle" }
androidx-lifecycle-viewmodel-compose = { module = "androidx.lifecycle:lifecycle-viewmodel-compose", version.ref = "androidx-lifecycle" }
androidx-lifecycle-viewmodel-ktx = { module = "androidx.lifecycle:lifecycle-viewmodel-ktx", version.ref = "androidx-lifecycle" }
androidx-lifecycle-viewmodel-savedstate = { module = "androidx.lifecycle:lifecycle-viewmodel-savedstate", version.ref = "androidx-lifecycle" }
androidx-navigation-compose = "androidx.navigation:navigation-compose:2.5.3"
burnoutcrew-reorderable = "org.burnoutcrew.composereorderable:reorderable:0.9.6"
coil-compose = { module = "io.coil-kt:coil-compose", version.ref = "io-coil-kt" }
coil-video = { module = "io.coil-kt:coil-video", version.ref = "io-coil-kt" }
firebase-analytics = { module = "com.google.firebase:firebase-analytics-ktx" }
firebase-auth = { module = "com.google.firebase:firebase-auth-ktx" }
firebase-bom = "com.google.firebase:firebase-bom:31.5.0"
firebase-database = { module = "com.google.firebase:firebase-database-ktx" }
firebase-dynamic-links = { module = "com.google.firebase:firebase-dynamic-links-ktx" }
firebase-firestore = { module = "com.google.firebase:firebase-firestore-ktx" }
firebase-messaging = { module = "com.google.firebase:firebase-messaging-ktx" }
firebase-storage = { module = "com.google.firebase:firebase-storage-ktx" }
google-play-services-auth = "com.google.android.gms:play-services-auth:20.5.0"
hilt-android = { module = "com.google.dagger:hilt-android", version.ref = "com-google-dagger" }
hilt-android-compiler = { module = "com.google.dagger:hilt-android-compiler", version.ref = "com-google-dagger" }
hilt-navigation-compose = "androidx.hilt:hilt-navigation-compose:1.0.0"
jsoup = "org.jsoup:jsoup:1.15.4"
junit = "junit:junit:4.13.2"

[bundles]
accompanist = [
    "accompanist-pager",
    "accompanist-pager-indicators",
    "accompanist-systemuicontroller",
]
compose = [
    "androidx-compose-material-icons-core",
    "androidx-compose-material-icons-extended",
    "androidx-compose-material3",
    "androidx-compose-material3-window",
    "androidx-compose-ui",
    "androidx-compose-ui-tooling-preview",
]
compose-debug = [
    "androidx-compose-ui-test-manifest",
    "androidx-compose-ui-tooling",
]
firebase = [
    "firebase-analytics",
    "firebase-auth",
    "firebase-database",
    "firebase-dynamic-links",
    "firebase-firestore",
    "firebase-messaging",
    "firebase-storage",
]
hilt = [
    "hilt-android",
    "hilt-navigation-compose",
]
lifecycle = [
    "androidx-lifecycle-runtime-ktx",
    "androidx-lifecycle-viewmodel-compose",
    "androidx-lifecycle-viewmodel-ktx",
    "androidx-lifecycle-viewmodel-savedstate",
]

[plugins]
android-application = { id = "com.android.application", version.ref = "android-gradle-plugin" }
android-library = { id = "com.android.library", version.ref = "android-gradle-plugin" }
devtools-ksp = "com.google.devtools.ksp:1.8.20-1.0.10"
google-services = "com.google.gms.google-services:4.3.15"
gradle-ktlint = "org.jlleitschuh.gradle.ktlint:11.3.1"
gradle-versions = "com.github.ben-manes.versions:0.46.0"
hilt-android = { id = "com.google.dagger.hilt.android", version.ref = "com-google-dagger" }
kotlin-android = { id = "org.jetbrains.kotlin.android", version.ref = "kotlin" }
kotlin-kapt = { id = "org.jetbrains.kotlin.kapt", version.ref = "kotlin" }
version-catalog-update = "nl.littlerobots.version-catalog-update:0.8.0"
